_schema-version: "3.3"
ID: my-btp-app
version: 1.0.0
description: SAP BTP application — CAP backend + UI5 Fiori frontend

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --prefix .
        - npm run build --prefix .

modules:
  - name: my-btp-app-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      build-result: .
    properties:
      EXIT: 1
      FIGAF_BASE_URL: https://app.figaf.com
      FIGAF_USE_DESTINATION: false
      FIGAF_DESTINATION_NAME: figaf-api
      # FIGAF_AGENT_SYSTEM_ID: set via cf set-env — do not hardcode here
      OPENAI_MODEL: gpt-4.1-mini
      OPENAI_MAX_TOKENS: 800
      FIGAF_PAGE_SIZE: 200
      # OPENAI_BASE_URL: defaults to https://api.openai.com — set here to override (e.g. Azure OpenAI proxy)
    requires:
      - name: my-btp-app-xsuaa
      - name: my-btp-app-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  - name: my-btp-app-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 128M
      disk-quota: 256M
    build-parameters:
      builder: custom
      commands:
        - npm install --prefix .
    requires:
      - name: my-btp-app-xsuaa
      - name: my-btp-app-destination
      - name: my-btp-app-html5-runtime
      - name: srv-api
        group: destinations
        properties:
          forwardAuthToken: true
          name: my-btp-app-backend
          url: ~{srv-url}
    properties:
      TENANT_HOST_PATTERN: "^(.*)-${default-uri}"
      BACKEND_TIMEOUT: 300
      SESSION_TIMEOUT: 720

  - name: my-btp-app-ui
    type: html5
    path: app/ui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install --prefix .
        - npm run build --prefix .
        - npm run zip --prefix .
      supported-platforms: []

  - name: my-btp-app-ui-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: my-btp-app-html5-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: my-btp-app-ui
          artifacts:
            - dist.zip
          target-path: resources/

  - name: my-btp-app-destination-content
    type: com.sap.application.content
    requires:
      - name: my-btp-app-xsuaa
        parameters:
          service-key:
            name: my-btp-app-xsuaa-key
      - name: my-btp-app-html5-host
        parameters:
          service-key:
            name: my-btp-app-html5-host-key
      - name: my-btp-app-destination
        parameters:
          content-target: true
    parameters:
      content:
        subaccount:
          existing_destinations_policy: update
          destinations:
            - Name: my-btp-app-html5-repo-host
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: my-btp-app-html5-host
              ServiceKeyName: my-btp-app-html5-host-key
              sap.cloud.service: mybtpappui
            - Name: my-btp-app-xsuaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: my-btp-app-xsuaa
              ServiceKeyName: my-btp-app-xsuaa-key
              sap.cloud.service: mybtpappui
    build-parameters:
      no-source: true

resources:
  - name: my-btp-app-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: my-btp-app-${org}-${space}
        tenant-mode: dedicated

  - name: my-btp-app-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: my-btp-app-backend
                Description: CAP backend service
                Authentication: NoAuthentication
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
  - name: my-btp-app-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: my-btp-app-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
