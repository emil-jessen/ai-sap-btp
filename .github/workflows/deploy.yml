name: Deploy to SAP BTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 20
  MBT_VERSION: 1.2.34
  CF_API: https://api.cf.us10-001.hana.ondemand.com
  CF_ORG: cd3f5509trial
  CF_SPACE: dev

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/ui/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

  build:
    name: Build MTA
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/ui/package-lock.json

      - name: Install Cloud Foundry CLI
        run: |
          wget -q -O cf.tgz \
            "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github"
          tar -xzf cf.tgz cf8
          sudo mv cf8 /usr/local/bin/cf
          cf --version

      - name: Install MBT (Multi-target Build Tool)
        run: npm install -g mbt@${{ env.MBT_VERSION }}

      - name: Install root dependencies
        run: npm ci

      - name: Install UI5 app dependencies
        run: npm ci --prefix app/ui

      - name: Build MTA archive
        run: mbt build -t ./mta_archives

      - name: Upload MTA archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mta-archive
          path: mta_archives/*.mtar
          retention-days: 7

  deploy:
    name: Deploy to SAP BTP
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download MTA archive
        uses: actions/download-artifact@v4
        with:
          name: mta-archive
          path: mta_archives

      - name: Install Cloud Foundry CLI
        run: |
          wget -q -O cf.tgz \
            "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github"
          tar -xzf cf.tgz cf8
          sudo mv cf8 /usr/local/bin/cf
          cf --version

      - name: Login to Cloud Foundry
        env:
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
        run: |
          cf api "${{ env.CF_API }}"
          cf auth "$CF_USERNAME" "$CF_PASSWORD"
          cf target -o "${{ env.CF_ORG }}" -s "${{ env.CF_SPACE }}"

      - name: Install MultiApps CF CLI Plugin
        run: |
          cf install-plugin -f multiapps

      - name: Deploy MTA archive
        run: |
          cf deploy mta_archives/*.mtar -f