name: Build & Deploy to SAP BTP Cloud Foundry

on:
  push:
    branches:
      - main        # auto-deploy on merge to main
    tags:
      - 'v*'        # also deploy on any version tag (e.g. v1.2.0)
  workflow_dispatch: # allow manual trigger from GitHub UI

# ────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (set in repo Settings → Secrets → Actions):
#
#   CF_API        – Cloud Foundry API endpoint
#                   e.g. https://api.cf.eu10.hana.ondemand.com
#   CF_ORG        – Your CF org name
#   CF_SPACE      – Your CF space name
#   CF_USERNAME   – CF user / service account email
#   CF_PASSWORD   – CF user / service account password
# ────────────────────────────────────────────────────────────────────────────

env:
  NODE_VERSION: "18"
  MBT_VERSION: "1.2.28"

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

# ── Job 2: Build MTA archive ───────────────────────────────────────────
build:
  name: Build MTA
  runs-on: ubuntu-latest
  needs: test
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: |
          package-lock.json
          app/ui/package-lock.json

    - name: Install Cloud Foundry CLI
      run: |
        wget -q -O cf.tgz \
          "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github"
        tar -xzf cf.tgz cf8
        sudo mv cf8 /usr/local/bin/cf
        cf --version

    - name: Install MBT (Multi-target Build Tool)
      run: npm install -g mbt@${{ env.MBT_VERSION }}

    - name: Install root dependencies
      run: npm ci

    - name: Install UI5 app dependencies
      run: npm ci --prefix app/ui

    - name: Build MTA archive
      run: mbt build -t ./mta_archives

    - name: Upload MTA archive as artifact
      uses: actions/upload-artifact@v4
      with:
        name: mta-archive
        path: mta_archives/*.mtar
        retention-days: 7
        
  # ── Job 3: Deploy to Cloud Foundry ────────────────────────────────────
  deploy:
    name: Deploy to CF (${{ github.ref_name }})
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Install Cloud Foundry CLI
        run: |
          wget -q -O cf.tgz \
            "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github"
          tar -xzf cf.tgz cf8
          sudo mv cf8 /usr/local/bin/cf

      - name: Install CF MTA plugin
        run: |
          cf install-plugin \
            "https://github.com/cloudfoundry/multiapps-cli-plugin/releases/latest/download/multiapps-plugin.linux64" \
            -f

      - name: Download MTA archive
        uses: actions/download-artifact@v4
        with:
          name: mta-archive
          path: mta_archives

      - name: Login to Cloud Foundry
        run: |
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Deploy MTA to CF
        run: |
          cf deploy mta_archives/*.mtar \
            --version-rule ALL \
            -f

      - name: Print deployed app URLs
        run: cf apps
